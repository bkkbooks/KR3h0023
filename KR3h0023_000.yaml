body:
  text: 提要寶章待訪録藝術類一書畫之屬臣等謹案寶章待訪録一卷宋米芾撰皆紀同時士大夫所藏晉唐墨蹟成於元祐元年丙寅書録解題作寶墨待訪録二卷與此互異疑陳振孫誤也自序謂太宗混一僞邦圖書皆聚而士民之間尚或藏者懼久廢忘故作此以俟訪分目睹的聞二類目暏者王羲之雪晴帖以下凡五十四條內張芝王翼二帖注云非真蓋與張直清所藏他帖連類全載之的聞者唐僧懷素自序以下凡二十九條大概與所撰書史相出入然書史詳而此較略中如王右軍來戲帖此書謂丁氏以一萬質於鄆州梁子志處而書史則謂質於其鄰大姓賈氏得二十千今十五年猶在賈氏又懷素三帖此書謂見於安師文家而書史則謂元祐戊辰安公攜至留吾家月餘今歸章公惇云云驗其嵗月皆當在此書既成之後知書史晚出故視此更為詳備也然其間如晉謝奕謝安桓溫三帖書史祗載竇蒙審定印而此書又載有鍾紹京書印陳僧智永歸田賦跋書史作開成某年而此書實作開成五年亦有可以互相考證者今故並著於録備𠫭訂焉海嶽名言藝術類一書畫之屬臣等謹案海嶽名言一卷宋米芾撰皆其平日論書之語於古人多所譏貶如謂歐栁為醜怪惡札之祖徐浩肥俗更無骨氣薛稷大字用筆如蒸餅顔魯公真字便入俗品皆深致不滿其所紀對徽宗之語於蔡襄沈遼黃庭堅蘇軾蔡京蔡卞尢極意詆訶史稱芾翰墨得王獻之筆意而書中於子敬書顧不置議論但云吾書取諸長處總而成之人見之不知以何為祖殆亦不免放誕矜炫之習然其心得既深所言運筆布格之法實能脫落蹊徑獨凑單微為書家之圭臬信臨池者所宜探索也其書原載入左圭百川學海中篇頁太少今以類相從附諸書寶章待訪録之末都為一帙焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書寶章待訪録宋米芾撰漢河間獻王購書必録古簡梁武元隋唐文帝金題玉躞錦質繡章破紙斷麻取而華國天寶以後或進書得官亦知上篤好本朝太宗混一僞邦國書皆聚然士民之間尚或藏者既非寶鑑皆以世傳聞見浸多懼久廢忘因作寶章待訪録以俟訪圗書使焉元祐丙寅八月九日目覩晉右軍王羲之書雪晴帖右真蹟在承務郎吳郡蘇激處集賢校理舜欽子也帖尾有古跋君倩字及褚氏字印陳僧智永真草書歸田賦右真蹟在襄陽魏泰處故南昌人裝題曰虞世南白麻紙有古跋曰開成五年白馬寺臨一過潭記某官潭泰遊湖外㩦行賞跋纍日唐率更令歐陽詢書衛靈公天寒鑿池帖右真蹟麻紙在魏泰處唐彭王傅徐浩書張九齡司徒告右真蹟用一尺髙絹書多渴筆詞云正大厦者柱石之力匡帝業者輔相之功生則保其雄名沒猶稱其盛德今在其孫曲江人嶺南縣令張仲容處某官於桂林借留半月仍以紙覆裹欲為重背仲容惜其印縫古紙不許九齡神道碑亦浩書唐中書令褚遂良枯木賦右唐粉蠟紙搨書也在承議即合肥魏倫處收以為真蹟魏氏刻石某官杭過潤借觀於甘露寺唐太師顔真卿書送辛子序右真蹟楮紙書在寶文閣學士謝景溫處前後為好事者以筆描二大印其文亂仍書鉉字其中幸不合縫鑒非鉉筆甚纍墨寶某佐寶文於潭屢經賞閲陳僧智永千文右唐粉蠟紙搨書有古跋云契闊艱難不敢失墜信好事也在前國子監直講楊褒處得於外舅王安國某元豐五年過金陵見之內二真字雙鈎填者然人猶未信為搨焉陳僧智永千文右楮紙書唐人臨寫在宣德郎陳幵處恭公姪作梵夾册雖非真蹟秀潤圎活逼真今已罕得某嘗三閲智永千文半卷右黃麻紙唐人臨書在刑部尚書丹陽蘇頌處王右軍蘭亭燕集序右唐粉蠟紙雙鈎摹本在蘇激處精神筆力毫髮畢備下真蹟一等此係馮承素輩搨賜大臣者舜欽父集賢校理耆購於蜀僧元靄某與激友善每過公必一出遂親為背飾唐太師顔真卿乞米帖右真蹟楮紙在朝請即蘇澥處度支即中舜元子也得於關中安氏士人多有臨榻本此卷古玉軸縫有舜元字印范仲淹而下題跋某嘗十餘閲唐率府長史張旭四帖右真蹟在杭州陸氏大姓也舊有五第一秋深第二前發第三汝官第四昨日第五承須今所存四帖汝官後有一古印文記不可辨昨日承須襞紙也陸氏子素從奉議即關景仁學因借橅三大帖余丱見石本於鎮戎軍及冠官桂林朝奉大夫關把為使者語及始知石在關氏二十五官潭把通判邠州以石本見寄三十五官杭而景仁為錢塘令陸氏子登進士第者來謁與關謝而閲之既見真蹟獨失秋深一帖詰之良久顰蹙而言嘉祐中太守沈文通借觀拆留不還自此復借出因亦不復借閲遣工橅得之即歸詰遘弟遬時為郡從事乃言在其姪延嗣處後復得閲今歸余家王右軍來戲帖右麻紙六朝人所臨寫旁注小真字數枚復以雌黃覆之在蘇州故相丁謂孫景處後以一萬質於鄆州梁子志處故相梁適孫也又有唐雙鈎橅帖亦在丁景處某皆有題跋韓擇木八分右真蹟楮紙在丁景處第二行書官位以大字改為中字唐太師顔魯公書名兩字右真蹟書嶺南刺史綾告在朝奉郎臨江許彥先處唐辨才弟子草書千文右黃麻書在龍圗閣直學士吳郡滕元發處滕以為智永書某閲其前空兩才字全不書固以疑之後復空永字遂定為辨才弟子所書故特闕其祖師二名耳唐虞世南枕卧帖右雙鈎唐模本在朝奉大夫錢塘關把處上有褚氏圗書印關嘗謂某曰昔越州一寺修佛殿於梁棟內龕藏一函古橅數十本所可記者王右軍十七帖世南枕卧帖十鬬九帖褚遂良奉書寧帖上皆有褚氏圗書字印致功精絶毫髮乾濃畢備關與僧善購得枕卧十鬬九書寧三帖唐祕書少監虞世南積時帖右古雙鈎摹本在承議郎洛陽李熙處翰林學士維之孫亦縫有褚氏印某借橅石唐僧髙間草書千文右楮紙真蹟在承議郎李熙處唐禮部尚書沈傳師書道林詩右在潭州道林寺四絶堂以杉板薄略布粉不蓋紋故嵗久不脫裴休書杜甫詩只存一甫字某嘗為杜板行以紀其事沈牌某官潭借留書齊半嵗榻得之石本為撫石僧希白務於徑快多改落筆端直無復縹眇榮回飛動之勢唐太子率更令歐陽詢書荀氏漢書節右楮册小楷在潭州南楚門胡氏淳處唐歐陽詢書道林之寺牌右在潭州道林之寺力險徑勾勒而成有刻板本又江南廬山多裴休題寺塔諸額雖乏筆力皆種種可愛羲之千文右楮紙書字筆力圎熟在宣州觀察支使王仲詵處故相圭之姪謬題賀知章書四字於韻字下非也顔魯公頓首夫人右真蹟楮紙破爛過半在駙馬都尉王晉卿家孫過庭草書千文右真蹟黃麻紙書縫書有梁秀收閲字印王氏圗書四字隨圈四轉其異製也在如上懷素詩一首右真蹟絹書在王晉卿第張長史虎兒等三帖右楮紙真蹟同上晉武帝王渾王戎王衍郗愔陸統桓溫陸雲謝安謝萬等十四帖右真蹟在駙馬都尉李公照第武帝王戎書字有篆籕氣象竒古墨色如漆紙皆磨破上有開元二字小印太平公主胡書印美哉不可得而加矣世之竒書也王涯永存珍祕印殷浩之印梁秀收閲古書記字印內郗愔一帖即閣本法帖所録者昔使王著取溥家書與閣下書雜模模此卷中獨取愔兩行餘在所棄哀哉謝安慰問帖字清古在二王之上宜乎批子敬帖尾也晉謝奕謝安桓溫三帖右真跡麻紙書在李公照家上有鍾紹京書印竇蒙審定字印印謝安一帖為後人恐墨淡得用深墨填過使人惋怛與前卷並有絹帖書爵號自為名筆黃素黃庭經右同上字札古無褚薛體殆六朝人所作縫有鍾紹京印後有陶榖漢時跋云此換鵝經也甲戌九月十一日百計取得此書詳觀誠無唐盛時是銛鋒筆行書雖恐非右軍誠爾界行有鍾紹京書印二字小印卷末真寫胎仙二字用陳氏圗書印印之又有錢氏忠孝之家印紙跋云山隂道士劉君以羣鵝獻右軍乞書黃庭經此是也逸少真書此經與樂毅論太史針告誓文纍表也蘭亭洛神賦皆行書其他並草書也草十行敵行書一字行書十行敵真書一字耳又續題云此乃明州刺史李桭景福中罷任過浚郊遺光祿朱卿朱卿名友文即梁祖之子後封慱王王薨豫獲於舊邸時貞明庚辰秋也晉都梁苑因重背之中書舍人陶榖記是日降麻以京兆安彥威兼副都統米某跋云印小字乃唐越公鍾紹京印也此書在李太師第固是甲觀顔魯公郭定襄爭坐位第一帖右楮紙真蹟用先豐縣先天廣德中牒起草禿筆字字意相連屬飛動詭形異狀得於外也世之顔行第一書也縫有顔氏守一圗書字印在宣教即安師文處長安大姓也為解鹽池勾當官㩦入京欲背豫得見之安自云季明文鹿脯帖在其家晉王右軍稚恭進鎮帖右麻紙書蹟後有太常卿蕭祐題跋在前著作郎王仲修處晉王羲之官奴帖右雙鈎麻紙本亦在王仲修處唐張右史季明賀八清鑑等帖右楮紙真蹟筆法徑古不類他書世間季明第一書也在承議郎蘇液處世多刻石懷素千文右絹書真蹟在蘇液處沈遘刻板本是也懷素書任華草書歌右真蹟兩幅絹書字法清逸歌辭竒偉在駙馬都尉王晉卿第尚方有三幅乃其後幅適完嘗請出第觀復歸尚方李雍多熱要葛粉帖右白麻紙真蹟上有唐氏雜蹟字印陳氏圗書字印勾德元圗書記字印紫微舍人石揚休物今在其孫前宿州支使夷庚處前一帖與光八郎謝惠鹿帖真蹟余過甬上於夷庚處購得之懷素草書祝融髙座帖右絹書兩行此字入神石紫微嘗刻石有六行今不見前四行問夷庚云在王洙參政家此亦為其子弟購去矣陳賢草書帖右六七紙字竒逸難辨如日本書上亦有唐氏雜蹟字印在駙馬都尉李公照家顔真卿祭叔濠州使君文右真蹟楮紙書改抹多在長安安氏子師文㩦至京顔真卿踈拙帖右麻紙書真字清徑秀發亦與李大夫時顔責硤州别駕此顔第一帖也懷素三帖右絹帖云貧道胸中如刀刺第二帖見顔公第三帖律公發懷素不與世之第一帖也亦見於師文懷素自序右在湖北運判承議郎蘇泌處前一帖破碎不存其父舜欽補之庾翼帖全幅上有竇蒙審定印張芝王翼二帖非真虞世南汝南公主墓志歐陽詢碧箋四帖草聖顔真卿與李大夫奏事張溆二帖懷素草書三幅楊凝式書三帖皇象急就唐橅竒絶右在故相張公齊賢孫名直清字汝欽處今為楚州山陽主簿王右軍桓溫破羌帖有開元印唐懷充跋右筆法入神竒絶帖與王仲修學士家稚恭帖同是神物有開元印懷充跋在蘇澄道淵之子之純處今為歙州判官王獻之送梨帖有黎氏印連栁公權跋王右軍言叙帖兩行有貞觀半印徐僧權字右在左藏庫副使劉季孫處據栁公權跋於唐太宗書前雜出獻之書乃將其父書却黏於獻之帖後云又一帖栁誤以父為子矣况不知書者乎李雍四帖內一幅碧箋有唐氏雜迹印勾德元圗書記印陳氏圗書印與石夷庚所藏多熱帖同右在章子厚家王右軍筆陳圗前有自寫真紙緊薄如金葉索索有聲右同上章公自云借於趙竦今為蔡河撥發王右軍紙妙筆精帖有貞觀印王大令日寒帖有唐氏雜迹印右故相王曽家物在其孫景融處後為前龍圗待制沈括存中取之古跋右軍作羊欣大令作薄紹之仍將大厯嵗跋刮去數字填為薛雍記之而故相薛居正題曰和傅遺余此蓋和凝為薛氏故物歸居正耳唐太宗雅不喜子敬書故時人以他名名之以應募所謂紹之書曰乃於耳字不刮去及不次獻之頓首字猶在一分許可識大厯所跋既不能辨復為不鑒之人所收遂使至寶永失其真吁可痛也的聞唐僧懷素自序右在朝奉即蘇液處杭州沈氏嘗刻板本泌激皆舜欽子蘇氏自參知政事易簡之子耆耆子舜欽欽之子激四世好事有精鑒亦張彥逺之比已上三事並激云見之洪元眘集右軍越州兩碑右真蹟在越州僧正子文處嘗通許借未果褚遂良書黃庭經右聞緑綾所書丁謂孫倩處質在無錫民家士多因邑官借出王右軍書家譜右在山隂縣王氏家越州教授王渙之以書扺某具言有此書虞世南書經右同上在越州上虞晉中令王獻之已復此莭帖右在朝請大夫新昌石元之家關景仁屢見之嘗橅石某見兩本字札精妙虞世南書汝南公主銘起草右在通直即洛陽王護處見橅本給事中舉元子云真蹟在洛陽好事家有古跋歐陽詢四帖右同上顔魯公書韻海右聞大書朱字魯公書小字他人作蘇駒云在其父刑部尚書處栁公權書栁尊師墓志右真蹟在錢塘唐坰處張長史千文三帖右同上模石乃李師中也洛陽人歐陽詢鄱陽帖右同上模石在靈隱寺褚遂良臨王右軍二帖右同上並坰自云未肯輕出老子西升經褚遂良書閻立本畫右在觀文殿學士洛陽馮京處晉王渾真草帖晉張翼帖宋阮研帖宋蕭思話表文帝批答右在駙馬都尉李瑋處某並見石本後見李云在髙橋楊氏未獲見顔真卿寒食帖右綾紙書在中書舍人錢協處世多石本王右軍玉潤帖右蘇州教授閭丘籲云在承議即建安王實處有古跋令裝書人背久不還及剪却半跋皆唐名公也付理不可得匠人願陪四十千即知其竊真得金已多蘭亭橅本右正議大夫章惇跋蘇激所收蘭亭云此與吾家所收同褚遂良奉書寧帖右見關把某見石本晉葛𤣥飛白天台字右見石本真蹟聞在台州唐東宮長史陸柬之書十八學士贊右西京留臺王瓘云在舍弟圭處唐髙間書令狐楚詩右真蹟在户部尚書康季常家某見石本在湖州歐陽詢二帖右在朝議大夫朝端彥處其本與蘇州進士周沔懷素書蕭常侍日下三帖右同上宋羊欣宋翼二帖並楮令模蘭亭右見中書舍人蘇軾云在故相王隨之孫景昌處橅石在湖州墨妙亭屢見石本今在沈存中括家栁公權紫絲靸蘭亭詩二帖右待制王廣淵橅石跋云龍圗大諫李公帥府暇日出書請橅石李師中也洛陽人張長史全本千文右見臨淮令曽孝藴云在京師謝氏亦寶文逺公族也顔魯公帖一軸五幅右見湖州巡檢供奉官石裔駙馬之孫云在其兄處王子敬帖右宣義王碩云其父所收未得將出寶章待訪録
